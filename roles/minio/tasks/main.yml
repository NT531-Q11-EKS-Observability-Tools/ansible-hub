- name: Install required packages for MinIO
  apt:
    name:
      - curl
    state: present
    update_cache: yes

- name: Create MinIO group
  group:
    name: "{{ minio_group }}"
    system: yes

- name: Create MinIO user
  user:
    name: "{{ minio_user }}"
    group: "{{ minio_group }}"
    system: yes
    shell: /usr/sbin/nologin
    create_home: no

- name: Create MinIO directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ minio_user }}"
    group: "{{ minio_group }}"
    mode: "0755"
  loop:
    - "{{ minio_data_dir }}"
    - "{{ minio_config_dir }}"

- name: Download MinIO binary
  get_url:
    url: "{{ minio_binary_url }}"
    dest: /usr/local/bin/minio
    mode: "0755"
    checksum: "{{ minio_binary_checksum if (minio_binary_checksum | length) > 0 else omit }}"
  notify: Restart MinIO

- name: Render MinIO environment file
  template:
    src: minio.env.j2
    dest: "{{ minio_env_file }}"
    owner: root
    group: root
    mode: "0600"
  notify: Restart MinIO

- name: Render MinIO systemd service
  template:
    src: minio.service.j2
    dest: /etc/systemd/system/minio.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart MinIO

- name: Ensure MinIO service is enabled and running
  systemd:
    name: minio
    daemon_reload: true
    enabled: yes
    state: started
