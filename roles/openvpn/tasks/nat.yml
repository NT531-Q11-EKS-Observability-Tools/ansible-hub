# ⚠️ QUAN TRỌNG:
# KHÔNG SNAT VPN → VPC
# Giữ nguyên source IP = 10.8.0.x
#
# Lý do:
# - Security Group đang allow 10.8.0.0/24
# - SNAT sẽ đổi source thành IP private của OpenVPN EC2
# - Gây lỗi SSH / kubectl / EKS private endpoint
